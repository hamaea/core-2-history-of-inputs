<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Studio</title>
<link rel="stylesheet" href="main.css" />
<link rel="script" href="script.js" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>
</head>
<body>

  <header>
    <h1>write a letter</h1>
    <p>whoever you want</p>
  </header>

  <div class="workspace">

    <!-- TOOLBAR -->
    <aside class="toolbar">

      <div class="tool-group">
        <span class="tool-section-title">font</span>
        <select class="font-select" id="fontFace" onchange="applyFont(this.value)">
          <option value="Georgia, serif">Georgia</option>
          <option value="'Times New Roman', serif">Times New Roman</option>
          <option value="Arial, sans-serif">Arial</option>
          <option value="'Courier New', monospace">Courier New</option>
        </select>
        <select class="size-select" id="fontSize" onchange="applySize(this.value)">
          <option value="13">Small — 13pt</option>
          <option value="15" selected>Normal — 15pt</option>
          <option value="17">Large — 17pt</option>
          <option value="20">XL — 20pt</option>
        </select>
      </div>

      <div class="tool-group">
        <span class="tool-section-title">style</span>
        <div class="tool-row">
          <button class="tool-btn" onclick="fmt('bold')"><b>B</b></button>
          <button class="tool-btn" onclick="fmt('italic')"><i>I</i></button>
          <button class="tool-btn" onclick="fmt('underline')"><u>U</u></button>
        </div>
      </div>

      <div class="tool-group">
        <span class="tool-section-title">align</span>
        <div class="align-btns">
          <button class="align-btn" onclick="align('left')">L</button>
          <button class="align-btn" onclick="align('center')">C</button>
          <button class="align-btn" onclick="align('right')">R</button>
          <button class="align-btn" onclick="align('justify')">J</button>
        </div>
      </div>

      <div class="tool-group">
        <span class="tool-section-title">ink color</span>
        <div class="color-row">
          <div class="color-dot active" style="background:#000000" title="Black"   onclick="applyColor('#000000',this)"></div>
          <div class="color-dot"        style="background:#1a3a8a" title="Blue"    onclick="applyColor('#1a3a8a',this)"></div>
          <div class="color-dot"        style="background:#1a4a2e" title="Green"   onclick="applyColor('#1a4a2e',this)"></div>
          <div class="color-dot"        style="background:#7a1f1f" title="Red"     onclick="applyColor('#7a1f1f',this)"></div>
          <div class="color-dot"        style="background:#5a3a7a" title="Purple"  onclick="applyColor('#5a3a7a',this)"></div>
        </div>
      </div>

      <hr class="tool-divider">

      <button class="export-btn" onclick="exportPDF()">Export as PDF</button>
      <button class="clear-btn"  onclick="clearLetter()">Clear Letter</button>

    </aside>

    <!-- PAPER -->
    <div class="paper-wrap">
      <div class="paper" id="letterPaper">

        <input class="letter-date" id="letterDate" type="text" placeholder="Date">
        <input class="letter-to"   id="letterTo"   type="text" placeholder="Dear ___,">

        <div class="letter-body" id="letterBody"
          contenteditable="true"
          data-placeholder="Begin your letter here…"
          oninput="updateWordCount()"
          spellcheck="true">
        </div>

        <input class="letter-sign" id="letterSign" type="text" placeholder="Sincerely,">
        <input class="letter-name" id="letterName" type="text" placeholder="Your name">

      </div>
      <div class="word-count" id="wordCount">0 words</div>
    </div>

  </div>

</body>
</html>
