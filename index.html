<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undo Button Study</title>
  <link rel="stylesheet" href="main.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="workspace">
    <main class="document-stage">
      <header class="document-header">
        <div class="header-copy">
          <h1>UNDO PLAYGROUND</h1>
          <button class="undo-button undo-01 undo-title-button" type="button" data-undo-button><span>UNDO</span></button>
        </div>
      </header>

      <article
        id="editorPage"
        class="document-page"
        contenteditable="true"
        spellcheck="true"
        data-placeholder="Type here, then click any undo button."
      ></article>
    </main>

    <div class="button-scatter" aria-label="Scattered undo button studies">
      <button class="undo-button undo-02 scatter-02" type="button" data-undo-button aria-label="Undo 02"></button>
      <button class="undo-button undo-03 scatter-03" type="button" data-undo-button><span>UNDO</span></button>
      <button class="undo-button undo-04 scatter-04" type="button" data-undo-button><span>Undo 04</span></button>
      <button class="undo-button undo-05 scatter-05" type="button" data-undo-button><span>Undo 05</span></button>
      <button class="undo-button undo-06 scatter-06" type="button" data-undo-button><span>Undo 06</span></button>
      <button class="undo-button undo-07 scatter-07" type="button" data-undo-button><span>Undo 07</span></button>
      <button class="undo-button undo-08 scatter-08" type="button" data-undo-button><span>Undo 08</span></button>
      <button class="undo-button undo-09 scatter-09" type="button" data-undo-button><span>Undo 09</span></button>
      <button class="undo-button undo-10 scatter-10" type="button" data-undo-button><span>Undo 10</span></button>
      <button class="undo-button undo-11 scatter-11" type="button" data-undo-button><span>Undo 11</span></button>
      <button class="undo-button undo-12 scatter-12" type="button" data-undo-button><span>Undo 12</span></button>
      <button class="undo-button undo-13 scatter-13" type="button" data-undo-button><span>Undo 13</span></button>
      <button class="undo-button undo-14 scatter-14" type="button" data-undo-button><span>Undo 14</span></button>
      <button class="undo-button undo-15 scatter-15" type="button" data-undo-button><span>Undo 15</span></button>
      <button class="undo-button undo-16 scatter-16" type="button" data-undo-button><span>Undo 16</span></button>
      <button class="undo-button undo-17 scatter-17" type="button" data-undo-button><span>Undo 17</span></button>
      <button class="undo-button undo-18 scatter-18" type="button" data-undo-button><span>Undo 18</span></button>
      <button class="undo-button undo-19 scatter-19" type="button" data-undo-button><span>Undo 19</span></button>
      <button class="undo-button undo-20 scatter-20" type="button" data-undo-button><span>Undo 20</span></button>
      <button class="undo-button undo-21 scatter-21" type="button" data-undo-button><span>Undo 21</span></button>
      <button class="undo-button undo-22 scatter-22" type="button" data-undo-button><span>Undo 22</span></button>
      <button class="undo-button undo-23 scatter-23" type="button" data-undo-button><span>Undo 23</span></button>
      <button class="undo-button undo-24 scatter-24" type="button" data-undo-button><span>Undo 24</span></button>
      <button class="undo-button undo-25 scatter-25" type="button" data-undo-button><span>Undo 25</span></button>
    </div>
  </div>
</body>
</html>
